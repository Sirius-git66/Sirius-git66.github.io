<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Working with AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Josefin+Sans:wght@100;200;300;400&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c9a84c;
      --gold-l:  #e8c97a;
      --gold-a:  rgba(201,168,76,0.22);
      --cream:   #f0e8d6;
      --bg:      #06060b;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Josefin Sans', sans-serif;
    }

    /* Top edge accent */
    body::before {
      content: '';
      position: fixed; top: 0; left: 0; right: 0;
      height: 1px; z-index: 100;
      background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold-l) 50%, var(--gold) 70%, transparent);
    }

    /* Bokeh canvas */
    #cv { position: fixed; inset: 0; z-index: 1; }

    /* Custom cursor glow */
    #cglow {
      position: fixed; width: 380px; height: 380px;
      border-radius: 50%; pointer-events: none; z-index: 8;
      background: radial-gradient(circle, rgba(201,168,76,0.055) 0%, transparent 68%);
      transform: translate(-50%,-50%);
      transition: left 0.08s ease, top 0.08s ease;
      left: 50%; top: 50%;
    }

    /* Scene */
    #scene {
      position: relative; z-index: 10;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── TITLE ───────────────────────────────────────────── */
    #tw { text-align: center; margin-bottom: 84px; }

    #title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 6.2vw, 5.8rem);
      letter-spacing: 0.15em;
      color: var(--cream);
      display: flex; flex-wrap: nowrap;
      perspective: 600px;
    }

    .ch {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px) rotateX(32deg);
      transform-origin: bottom center;
      transition: opacity 0.52s ease, transform 0.52s ease;
    }
    .ch.on { opacity: 1; transform: translateY(0) rotateX(0deg); }

    #tline {
      display: block; height: 1px; width: 0;
      margin: 18px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-l), var(--gold), transparent);
      transition: width 1.5s cubic-bezier(0.2, 0, 0.1, 1);
    }

    #sub {
      margin-top: 14px;
      font-size: 0.6rem; letter-spacing: 0.48em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.42);
      opacity: 0;
      transition: opacity 1.1s ease;
    }
    #sub.on { opacity: 1; }

    /* ── OPTIONS ROW ─────────────────────────────────────── */
    #opts {
      display: flex; align-items: center; gap: 0;
      opacity: 0; transform: translateY(28px);
      transition: opacity 1.1s ease, transform 1.1s cubic-bezier(0.2,0,0.1,1);
    }
    #opts.on { opacity: 1; transform: translateY(0); }

    /* Stickman zone */
    #smz { width: 116px; height: 315px; position: relative; flex-shrink: 0; overflow: visible; }
    #smw { position: absolute; bottom: 14px; left: 50%; pointer-events: none; will-change: transform; }
    #sm  { overflow: visible; display: block; }

    /* ── CARDS ───────────────────────────────────────────── */
    .cw { perspective: 950px; }

    .card {
      width: 212px; height: 315px;
      background: rgba(11,10,20,0.72);
      border: 1px solid var(--gold-a);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      backdrop-filter: blur(20px) saturate(1.2);
      transform-style: preserve-3d;
      will-change: transform, box-shadow;
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
      overflow: hidden;
    }

    /* Corner brackets */
    .c {
      position: absolute; width: 13px; height: 13px;
      border-color: var(--gold); border-style: solid;
      opacity: 0.28;
      transition: opacity 0.4s ease, width 0.4s ease, height 0.4s ease;
    }
    .c.tl { top: 12px;    left: 12px;  border-width: 1px 0 0 1px; }
    .c.tr { top: 12px;    right: 12px; border-width: 1px 1px 0 0; }
    .c.bl { bottom: 12px; left: 12px;  border-width: 0 0 1px 1px; }
    .c.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }
    .card.lit .c { opacity: 1; width: 18px; height: 18px; }

    /* Background numeral */
    .num {
      position: absolute; top: 10px; right: 15px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 6rem; font-weight: 300;
      color: rgba(201,168,76,0.065); line-height: 1;
      user-select: none; pointer-events: none;
    }

    /* Icon glyph */
    .ico {
      font-size: 1.55rem; color: rgba(201,168,76,0.42);
      margin-bottom: 15px;
      transition: color 0.4s ease, transform 0.4s ease;
    }
    .card.lit .ico { color: var(--gold); transform: scale(1.12); }

    /* Divider */
    .dvd {
      width: 28px; height: 1px;
      background: var(--gold-a); margin-bottom: 15px;
      transition: width 0.4s ease, background 0.4s ease;
    }
    .card.lit .dvd { width: 46px; background: var(--gold); }

    /* Label */
    .lbl {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300; font-size: 0.74rem;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(240,232,214,0.6);
      transition: color 0.4s ease, letter-spacing 0.4s ease;
    }
    .card.lit .lbl { color: var(--gold-l); letter-spacing: 0.36em; }

    /* Shimmer overlay */
    .card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg,
        rgba(201,168,76,0) 0%, rgba(201,168,76,0.055) 50%, rgba(201,168,76,0) 100%);
      opacity: 0; transition: opacity 0.4s ease;
    }
    .card.lit::after { opacity: 1; }

    /* ── REVOLVING DOOR ──────────────────────────────────── */
    @keyframes dL {
      0%   { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(-90deg); opacity: 0; }
    }
    @keyframes dR {
      0%   { transform: rotateY(0deg); opacity: 1; }
      100% { transform: rotateY(90deg); opacity: 0; }
    }

    .card.dL {
      transform-origin: left center;
      animation: dL 0.78s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }
    .card.dR {
      transform-origin: right center;
      animation: dR 0.78s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }

    /* ── FOOTER ──────────────────────────────────────────── */
    #ft {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%); z-index: 20;
      font-weight: 100; font-size: 0.58rem;
      letter-spacing: 0.52em; text-transform: uppercase;
      color: rgba(201,168,76,0.18);
      white-space: nowrap; pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="cv"></canvas>
<div id="cglow"></div>

<div id="scene">

  <div id="tw">
    <h1 id="title"></h1>
    <span id="tline"></span>
    <p id="sub">Select your journey</p>
  </div>

  <div id="opts">

    <!-- Card 1 -->
    <div class="cw">
      <div class="card" id="c1">
        <span class="c tl"></span><span class="c tr"></span>
        <span class="c bl"></span><span class="c br"></span>
        <span class="num">01</span>
        <div class="ico">◎</div>
        <div class="dvd"></div>
        <span class="lbl">Online Course</span>
      </div>
    </div>

    <!-- Stickman zone -->
    <div id="smz">
      <div id="smw">
        <svg id="sm" width="44" height="84" viewBox="0 0 44 84">
          <circle id="hd" cx="22" cy="10" r="8"
            stroke="#c9a84c" stroke-width="1.9" fill="none" stroke-linecap="round"/>
          <line id="bd" x1="22" y1="18" x2="22" y2="51"
            stroke="#c9a84c" stroke-width="1.9" stroke-linecap="round"/>
          <line id="al" x1="22" y1="28" x2="9"  y2="40"
            stroke="#c9a84c" stroke-width="1.9" stroke-linecap="round"/>
          <line id="ar" x1="22" y1="28" x2="35" y2="40"
            stroke="#c9a84c" stroke-width="1.9" stroke-linecap="round"/>
          <line id="ll" x1="22" y1="51" x2="12" y2="71"
            stroke="#c9a84c" stroke-width="1.9" stroke-linecap="round"/>
          <line id="lr" x1="22" y1="51" x2="32" y2="71"
            stroke="#c9a84c" stroke-width="1.9" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="cw">
      <div class="card" id="c2">
        <span class="c tl"></span><span class="c tr"></span>
        <span class="c bl"></span><span class="c br"></span>
        <span class="num">02</span>
        <div class="ico">◈</div>
        <div class="dvd"></div>
        <span class="lbl">Bid Prototype</span>
      </div>
    </div>

  </div>
</div>

<div id="ft">Working with AI &nbsp;·&nbsp; Choose your path</div>

<script>
(function () {
  'use strict';

  // ── CURSOR GLOW ──────────────────────────────────────────────────────────
  const cglow = document.getElementById('cglow');
  document.addEventListener('mousemove', e => {
    cglow.style.left = e.clientX + 'px';
    cglow.style.top  = e.clientY + 'px';
  });

  // ── BOKEH CANVAS ─────────────────────────────────────────────────────────
  const canvas = document.getElementById('cv');
  const ctx    = canvas.getContext('2d');

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize(); addEventListener('resize', resize);

  // Warm gold + cool indigo palette for depth contrast
  const PALETTES = [
    [210, 175, 78],  // bright gold
    [185, 145, 52],  // mid gold
    [240, 215, 130], // pale gold
    [160, 130, 45],  // deep gold
    [65,  90,  205], // indigo
    [45,  60,  175], // deep indigo
    [90,  115, 230], // light indigo
    [225, 210, 165], // cream
  ];

  const N   = 74;
  const pts = Array.from({ length: N }, () => {
    const [r, g, b] = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    return {
      x:   Math.random(),
      y:   Math.random(),
      rad: 5 + Math.pow(Math.random(), 1.4) * 36,
      op:  0.012 + Math.random() * 0.09,
      vx:  (Math.random() - 0.5) * 0.005,
      vy: -(0.002 + Math.random() * 0.007),
      ph:  Math.random() * Math.PI * 2,
      fr:  0.1 + Math.random() * 0.45,
      r, g, b,
    };
  });

  function drawBokeh(t, dt) {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    for (const p of pts) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.y < -0.12) p.y =  1.12;
      if (p.x < -0.12) p.x =  1.12;
      if (p.x >  1.12) p.x = -0.12;

      const op  = Math.max(0, p.op + Math.sin(t * p.fr + p.ph) * 0.016);
      const px  = p.x * W, py = p.y * H;
      const grd = ctx.createRadialGradient(px, py, 0, px, py, p.rad);
      grd.addColorStop(0,    `rgba(${p.r},${p.g},${p.b},${op})`);
      grd.addColorStop(0.42, `rgba(${p.r},${p.g},${p.b},${op * 0.28})`);
      grd.addColorStop(1,    `rgba(${p.r},${p.g},${p.b},0)`);
      ctx.beginPath();
      ctx.arc(px, py, p.rad, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Radial vignette on canvas
    const vg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.hypot(W, H) * 0.53);
    vg.addColorStop(0,    'rgba(4,3,10,0)');
    vg.addColorStop(0.52, 'rgba(4,3,10,0)');
    vg.addColorStop(1,    'rgba(4,3,10,0.9)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  // ── TITLE REVEAL ─────────────────────────────────────────────────────────
  const titleEl = document.getElementById('title');
  const tLine   = document.getElementById('tline');
  const subEl   = document.getElementById('sub');
  const TEXT    = 'Working with AI';

  TEXT.split('').forEach(ch => {
    const s   = document.createElement('span');
    s.className = 'ch';
    s.textContent = ch === ' ' ? '\u00a0' : ch;
    if (ch === ' ') s.style.minWidth = '0.28em';
    titleEl.appendChild(s);
  });

  const chars = [...titleEl.querySelectorAll('.ch')];

  function revealTitle() {
    chars.forEach((c, i) => {
      setTimeout(() => c.classList.add('on'), 100 + i * 70);
    });
    const after = 100 + chars.length * 70 + 200;
    setTimeout(() => { tLine.style.width = '100%'; }, after);
    setTimeout(() => { subEl.classList.add('on'); },  after + 650);
  }

  // ── OPTIONS TIMING ────────────────────────────────────────────────────────
  const optsEl  = document.getElementById('opts');
  const APPEAR  = 1500 + 100 + chars.length * 70;

  setTimeout(revealTitle, 300);
  setTimeout(() => {
    optsEl.classList.add('on');
    sm.state = 'walking';
  }, APPEAR);

  // ── CARDS & HOVER ─────────────────────────────────────────────────────────
  const card1 = document.getElementById('c1');
  const card2 = document.getElementById('c2');
  let locked  = false;

  function fireCard(card, cls, href) {
    if (locked) return;
    locked = true;
    sm.setDir(card === card1 ? -1 : 1);
    sm.state   = 'pushing';
    sm.pushDir = card === card1 ? -1 : 1;
    sm.t       = 0;
    setTimeout(() => {
      card.classList.add(cls);
      setTimeout(() => { location.href = href; }, 900);
    }, 460);
  }

  card1.addEventListener('click', () => fireCard(card1, 'dL', 'course.html'));
  card2.addEventListener('click', () => fireCard(card2, 'dR', 'prototype.html'));

  document.addEventListener('mousemove', e => {
    if (locked) return;

    // Card proximity glow + 3D tilt
    [card1, card2].forEach(card => {
      const r    = card.getBoundingClientRect();
      const ccx  = r.left + r.width  / 2;
      const ccy  = r.top  + r.height / 2;
      const dist = Math.hypot(e.clientX - ccx, e.clientY - ccy);
      const maxD = 265;
      const intn = Math.max(0, 1 - dist / maxD);

      if (intn > 0.04) {
        card.classList.add('lit');
        const dx   = (e.clientX - ccx) / (r.width  / 2);
        const dy   = (e.clientY - ccy) / (r.height / 2);
        const tilt = 7.5 * intn;
        card.style.transform  = `perspective(850px) rotateY(${dx * tilt}deg) rotateX(${-dy * tilt}deg) translateZ(${intn * 11}px)`;
        card.style.boxShadow  = `0 0 ${intn * 58}px rgba(201,168,76,${intn * 0.22}), 0 0 ${intn * 22}px rgba(201,168,76,${intn * 0.12}), inset 0 0 24px rgba(201,168,76,${intn * 0.055})`;
        card.style.borderColor= `rgba(201,168,76,${0.2 + intn * 0.55})`;
      } else {
        card.classList.remove('lit');
        card.style.cssText = '';
      }
    });

    // Stickman attraction
    const s = sm.state;
    if (!locked && (s === 'walking' || s === 'approaching' || s === 'arrived')) {
      const r1  = card1.getBoundingClientRect();
      const r2  = card2.getBoundingClientRect();
      const cx1 = r1.left + r1.width / 2;
      const cx2 = r2.left + r2.width / 2;
      const d1  = Math.abs(e.clientX - cx1);
      const d2  = Math.abs(e.clientX - cx2);
      const THR = 200;

      if (d1 < THR && d1 < d2) {
        sm.targetX = -50; sm.state = 'approaching';
      } else if (d2 < THR && d2 < d1) {
        sm.targetX =  50; sm.state = 'approaching';
      } else if (s !== 'walking') {
        sm.state = 'walking';
      }
    }
  });

  // ── STICKMAN ──────────────────────────────────────────────────────────────
  const smWrap = document.getElementById('smw');
  const smEl   = document.getElementById('sm');
  const hd     = document.getElementById('hd');
  const bd     = document.getElementById('bd');
  const al     = document.getElementById('al');
  const ar     = document.getElementById('ar');
  const ll     = document.getElementById('ll');
  const lr     = document.getElementById('lr');

  const RANGE = 44;

  const sm = {
    x: 0, targetX: 0, dir: 1, t: 0,
    state: 'idle', flipped: false, pushDir: 1,

    setDir(d) {
      this.dir = d;
      const f  = d < 0;
      if (f !== this.flipped) {
        this.flipped = f;
        smEl.style.transform = f ? 'scaleX(-1)' : 'scaleX(1)';
      }
    },

    update(dt) {
      if (this.state === 'idle') return;

      if (this.state === 'walking') {
        this.t += dt * 5;
        this.x += this.dir * dt * 46;
        if (this.x >  RANGE) { this.x =  RANGE; this.setDir(-1); }
        if (this.x < -RANGE) { this.x = -RANGE; this.setDir( 1); }
        this.drawWalk();

      } else if (this.state === 'approaching') {
        this.t += dt * 5;
        const dx = this.targetX - this.x;
        if (Math.abs(dx) < 2) {
          this.x = this.targetX; this.state = 'arrived'; this.drawStand();
        } else {
          this.x += Math.min(Math.abs(dx), dt * 70) * Math.sign(dx);
          this.setDir(Math.sign(dx));
          this.drawWalk();
        }

      } else if (this.state === 'arrived') {
        this.t = 0; this.drawStand();

      } else if (this.state === 'pushing') {
        this.t += dt * 2.6;
        this.drawPush();
      }

      smWrap.style.transform = `translateX(calc(-50% + ${this.x}px))`;
    },

    drawWalk() {
      const s = Math.sin(this.t);
      const a = Math.abs(s);
      // Head bobs slightly
      hd.setAttribute('cy', (10 - a * 1.3).toString());
      // Arms swing (opposite to legs)
      al.setAttribute('x2', (22 + 12 * s).toString()); al.setAttribute('y2', (39 - a * 2).toString());
      ar.setAttribute('x2', (22 - 12 * s).toString()); ar.setAttribute('y2', (39 + a * 2).toString());
      // Legs alternate
      ll.setAttribute('x2', (22 -  9 * s).toString()); ll.setAttribute('y2', (69 + a * 1.5).toString());
      lr.setAttribute('x2', (22 +  9 * s).toString()); lr.setAttribute('y2', (69 - a * 1.5).toString());
    },

    drawStand() {
      hd.setAttribute('cy', '10');
      al.setAttribute('x2', '9');  al.setAttribute('y2', '40');
      ar.setAttribute('x2', '35'); ar.setAttribute('y2', '40');
      ll.setAttribute('x2', '12'); ll.setAttribute('y2', '70');
      lr.setAttribute('x2', '32'); lr.setAttribute('y2', '70');
    },

    drawPush() {
      // Stickman leans into the push
      const phase = Math.min(this.t, 1.3);
      const push  = Math.sin(phase * Math.PI * 0.5); // 0 → 1

      hd.setAttribute('cy', (10 + push * 2.5).toString());
      bd.setAttribute('x2', (22 + push * 3.5).toString()); // body leans
      // Both arms reach forward (SVG space — flipped when facing left)
      al.setAttribute('x2', (22 +  push * 9).toString()); al.setAttribute('y2', (33 + push * 5).toString());
      ar.setAttribute('x2', (22 + 13 + push * 7).toString()); ar.setAttribute('y2', (30 + push * 3).toString());
      // Legs brace
      ll.setAttribute('x2', '11'); ll.setAttribute('y2', '72');
      lr.setAttribute('x2', '30'); lr.setAttribute('y2', '74');
    },
  };

  // ── MAIN LOOP ─────────────────────────────────────────────────────────────
  let lastTs = 0;
  (function loop(ts) {
    const t  = ts / 1000;
    const dt = Math.min(t - lastTs, 0.05);
    lastTs = t;
    drawBokeh(t, dt);
    sm.update(dt);
    requestAnimationFrame(loop);
  })(0);

})();
</script>
</body>
</html>
